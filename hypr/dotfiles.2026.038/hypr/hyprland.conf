### main hypr config file ######################################################
# $HOME/.config/hypr/hyprland.conf                                             #
################################################################################

# display arrangement - single (laptop), or multiple displays / dedicated GPU
# <https://wiki.hypr.land/Configuring/Monitors/>
# monitor=,preferred,auto,auto

# dedicated gpu / multiple displays. Use nwg-display for GUI config
source = monitors.conf
source = nvidia.conf
################################################################################

# <https://wiki.hypr.land/Configuring/Keywords/>
$terminal = kitty
$fileManager = dolphin
$menu = rofi -show run

# Services to run on startup.  Hyprland will exec in the background. 
exec-once = xhost +si:localuser=root
exec-once = waybar
exec-once = systemctl --user start hyprpolkitagent
exec-once = systemctl --user start xdg-desktop-portal-hyprland
exec-once = nm-applet
exec-once = hyprpaper -c /home/matt/.config/hypr/hyprpaper.d/hyprpaper.conf
exec-once = nwg-dock-hyprland -d
exec-once = hypridle
# the setcursor references GTK theme(s) (gnome), which is located under
#   /usr/share/icons, /usr/share/themes, or $HOME/.local/share/icons
# exec-once = hyprctl setcursor Oxygen_Yellow
exec-once = hyprctl setcursor XCursor-Pro-Hyprcursor-Dark 36
# autostart
exec-once = /usr/bin/chromium
exec-once = kitty --new-window

exec-once = hyprshell run &
#exec-once = hyprswitch init --show-title --size-factor 6 --workspaces-per-row 5 &
#bind = ALT, tab, exec, hyprswitch gui --mod-key ALT --key tab
# exec-once = hyprswitch init --show-title --size-factor 5.5 --workspaces-per-row 5 &
# bind = ALT, tab, exec, hyprswitch gui --mod-key $mod --key $key --max-switch-offset 9 --hide-active-window-border

################################################################################

# environment vars
# <https://wiki.hypr.land/Configuring/Environment-variables/>
env = XDG_DATA_DIRS,/usr/local/share/:/usr/share/:/var/lib/flatpak/exports/share/
env = HYPRCURSOR_SIZE,32

# look and feel
# <https://wiki.hypr.land/Configuring/Variables/>
# <https://wiki.hypr.land/Configuring/Variables/#general>
general {
    gaps_in = 2
    gaps_out = 2
    border_size = 4

    # <https://wiki.hypr.land/Configuring/Variables/#variable-types>
    col.active_border = rgba(ff0000ee) rgba(4000ffee) 45deg
    col.inactive_border = rgba(14e8ffee) rgba(7fff5cee) 45deg
    resize_on_border = true
    allow_tearing = false
    layout = dwindle
}
################ window aesthetics and functionality ####################
# <https://wiki.hypr.land/Configuring/Variables/#decoration>
decoration {
    rounding = 6
    rounding_power = 2
    active_opacity = 1.0
    inactive_opacity = 0.99
    shadow {
        enabled = true
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }
    # blur allows for transparency without clashing with the foreground
    # <https://wiki.hypr.land/Configuring/Variables/#blur>
    blur {
        enabled = true
        size = 10
        passes = 2
        new_optimizations = on
        ignore_opacity = false
        xray = true
        vibrancy = 0.1696
    }
    shadow {
        enabled = true
        range = 16
        render_power = 2
        color = rgba( 25, 40, 250, 100% )
    }
}
# default/included animation config
# <https://wiki.hypr.land/Configuring/Variables/#animations>
animations {
    #enabled = yes, please :)
    enabled = true

    # Default curves, see https://wiki.hypr.land/Configuring/Animations/#curves
    #        NAME,           X0,   Y0,   X1,   Y1
    bezier = easeOutQuint,   0.23, 1,    0.32, 1
    bezier = easeInOutCubic, 0.65, 0.05, 0.36, 1
    bezier = linear,         0,    0,    1,    1
    bezier = almostLinear,   0.5,  0.5,  0.75, 1
    bezier = quick,          0.15, 0,    0.1,  1

    # Default animations, see https://wiki.hypr.land/Configuring/Animations/
    #           NAME,          ONOFF, SPEED, CURVE,        [STYLE]
    animation = global,        1,     10,    default
    animation = border,        1,     5.39,  easeOutQuint
    animation = windows,       1,     4.79,  easeOutQuint
    animation = windowsIn,     1,     4.1,   easeOutQuint, popin 87%
    animation = windowsOut,    1,     1.49,  linear,       popin 87%
    animation = fadeIn,        1,     1.73,  almostLinear
    animation = fadeOut,       1,     1.46,  almostLinear
    animation = fade,          1,     3.03,  quick
    animation = layers,        1,     3.81,  easeOutQuint
    animation = layersIn,      1,     4,     easeOutQuint, fade
    animation = layersOut,     1,     1.5,   linear,       fade
    animation = fadeLayersIn,  1,     1.79,  almostLinear
    animation = fadeLayersOut, 1,     1.39,  almostLinear
    animation = workspaces,    1,     1.94,  almostLinear, fade
    animation = workspacesIn,  1,     1.21,  almostLinear, fade
    animation = workspacesOut, 1,     1.94,  almostLinear, fade
    animation = zoomFactor,    1,     7,     quick
}

