### lock screen config ########################################################
# source = colors.conf
general {
    ignore_empty_input = true
}
background {
    monitor =
    path = /home/matt/.config/hypr/hyprpaper.d/el_pulpo_mechanico_2.png
}
input-field {
    monitor =
    size = 200, 50
    dots_size = 0.33
    dots_spacing = 0.15
    dots_center = true
    dots_rounding = -1
    inner_color = rgba(ff0000ee)
    font_color = rgba(14e8ffee)
    font_family = IntoneMono Nerd Font
    outer_color = rgba(4000ffee)
    outline_thickness = 3
    fade_on_empty = true
    fade_timeout = 1000
    placeholder_text = <i>Input Password...</i>
    hide_input = false
    rounding = 10
    check_color = rgba(4000ffee)
    fail_color = rgba(7fff5cee)
    fail_text = <i>$FAIL <b>($ATTEMPTS)</b></i>
    capslock_color = -1
    numlock_color = -1
    bothlock_color = -1
    invert_numlock = false
    swap_font_color = false
    position = 0, -20
    halign = center
    valign = center
    shadow_passes = 10
    shadow_size = 20
    shadow_color = rgba(7fff5cee)
    shadow_boost = 1.6
}
label {
    monitor =
    #clock
    text = cmd[update:1000] echo "$TIME"
    color = #ffffff
    font_size = 70
    font_family = IntoneMono Nerd Font
    position = -50, 20
    halign = right
    valign = bottom
    shadow_passes = 5
    shadow_size = 10
}
label {
    monitor =
    text = $USER
    color = #ffffff
    font_size = 20
    font_family = IntoneMono Nerd Font
    position = -50, 120
    halign = right
    valign = bottom
    shadow_passes = 5
    shadow_size = 10
}
image {
    monitor =
    path = /home/matt/.config/hypr/hyprpaper.d/screen2.png
    size = 280
    rounding = 40
    border_size = 4
    border_color = rgba(14e8ffee)
    rotate = 0
    reload_time = -1
    position = 0, 200
    halign = center
    valign = center
    shadow_passes = 10
    shadow_size = 20
    shadow_color = rgba(7fff5cee)
    shadow_boost = 1.6
}
