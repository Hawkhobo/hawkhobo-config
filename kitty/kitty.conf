font_size 8
scrollback_lines 10000
background_opacity 0.82
cursor_trail 1

allow_remote_control yes
listen_on unix:/tmp/mykitty

# maintain working directory in new tab
map ctrl+shift+t launch --cwd=current --type=tab
# snap current tab into separate OS window
map ctrl+f2 combine : kitten @ detach-tab : focus_os_window


# BEGIN_KITTY_FONTS
font_family      family="Liberation Mono"
bold_font        auto
italic_font      auto
bold_italic_font auto
# END_KITTY_FONTS
